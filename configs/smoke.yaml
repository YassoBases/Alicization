# Smoke config: tiny run that must finish < 3 min on CPU.
# Values mirror docs/training.md "Training Defaults" (smoke column).

inherit: base.yaml

agent: {hidden_size: 64}
ppo: {num_envs: 4, rollout_steps: 32, total_steps: 20_000}
rssm: {deter: 64, stoch: 8, seq_len: 20, batch_seqs: 4, replay_capacity: 20_000,
       sleep_every: 2_000, sleep_grad_steps: 20}
world: {size: 32}
