# Base config. Values mirror docs/training.md "Training Defaults" (base column).
# smoke.yaml / full.yaml inherit from this file and override.
#
# Sized for a laptop GPU (>=4 GB VRAM) but everything runs on CPU too.

seed: 7
device: auto              # auto -> cuda if torch.cuda.is_available() else cpu
amp: false                 # optional bf16 autocast; enable only if profiled faster

world:
  size: 64
  obs_window: 11
  day_length: 1000
  # Everything below is engine detail not covered by the pasted training
  # defaults; kept from the stage-1 world build-out (docs/logging.md /
  # world/engine.py). Config-driven per the "no magic numbers" rule.
  night_start_frac: 0.5
  terrain:
    num_types: 3
    move_cost: [1.0, 2.0, 4.0]
    frequencies: [0.7, 0.2, 0.1]
  energy:
    init: 1.0
    max: 1.0
    move_cost: 0.002
    base_drain: 0.0005
    night_drain: 0.002
    eat_gain: 0.25
  fatigue:
    init: 0.0
    max: 1.0
    move_gain: 0.001
    rest_recovery: 0.02
  food:
    num_patches: 40
    regrow_interval_range: [200, 800]
  water:
    num_tiles: 30
  shelter:
    num_tiles: 12
  levers: null

agent:
  core: gru                   # additive: gru | rssm (stage-4a drop-in switch)
  controller: actor           # additive: actor | arbiter (stage-4c macro-plans)
  encoder_channels: [32, 64]
  hidden_size: 256           # GRU hidden / RSSM deterministic size
  gru_layers: 1
  use_ledger_features: true   # additive: false = capability_shift battery's
                               # architecture-B control (Ledger not fed to policy)

ppo:
  num_envs: 16
  rollout_steps: 128        # per env per update -> 2048 transitions/update
  seq_len: 16                # BPTT chunk; must divide rollout_steps
  epochs: 4
  minibatch_transitions: 256
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  total_steps: 2_000_000
  # Additive knobs (not in the pasted defaults) needed by this implementation:
  anneal_lr: true
  norm_adv: true
  value_clip: 0.2            # null disables value clipping
  episode_length: 2048       # trainer-side time limit -> done + env rebuild
  reward:                    # baseline task terms; see training/reward.py
    eat: 1.0
    step_cost: 0.001
    deficit_threshold: 0.2
    deficit_penalty: 0.01

rssm:                        # stage-4a: wired into training via agent.core=rssm
  deter: 256
  stoch: 32                  # Gaussian latent
  embed: 256
  ensemble_k: 4               # dynamics heads for epistemic disagreement
  seq_len: 50
  batch_seqs: 16
  world_lr: 3.0e-4
  ac_lr: 1.0e-4
  imagination_horizon: 15
  replay_capacity: 500_000
  sleep_every: 5_000          # env steps between consolidation windows
  sleep_grad_steps: 200
  # Additive knobs (not in the pasted defaults) needed by this implementation:
  free_nats: 1.0
  kl_balance: 0.8
  min_std: 0.1
  sleep: true                  # false = wake-only (sleep-ablation condition)
  critic_ema_tau: 0.02         # slow EMA target critic (stage-4b imagination)
  imagination_lambda: 0.95
  imagination_norm_adv: true   # normalize imagined advantages (see sleep.py)
  priority_alpha: 0.6          # proportional prioritized replay exponent
  monitor:                    # participation-ratio collapse detector
    every_ticks: 1000
    window: 1000
    collapse_frac: 0.25

ledger:
  body_hidden: [128, 128]       # stage-3a: body model, wired into training
  forecaster_hidden: [256, 256] # stage-4c: forecaster, trained in sleep
  horizons: [1, 10]           # add 100 in Stage 6
  lr: 1.0e-3
  online_updates: true        # body + reliability heads only
  log_ema_decay: 0.98          # additive: TB rolling-mean smoothing for ledger/* scalars
  forecast_buffer: 20000       # additive: (h, plan, realized-future) tuple store
  forecaster_batch: 512        # additive: NLL minibatch size in sleep
  arbiter:                     # additive: stage-4c macro-plan arbiter
    epsilon: 0.1
    score_horizon: 10          # must be one of ledger.horizons
    plan_commit_ticks: 10
    setpoint_energy: 1.0
    setpoint_fatigue: 0.0
    weight_energy: 1.0
    weight_fatigue: 0.25
  reliability:                 # additive: stage-5b memory reliability
    enabled: true              # false = reliability-blind ablation (verification
                               # still runs; predictions influence nothing)
    lr: 1.0e-3
    age_tau: 5000
    radius: 2                  # revisit distance (Chebyshev) for verification
    min_age: 50                # don't verify entries younger than this
    verify_cooldown: 25        # ticks between re-verifications of one entry
    queue_capacity: 5000
    region_size: 8             # volatility-estimate grid granularity
    volatility_ema: 0.05
  attribution:                 # stage-3b: self/world/both classifier, wired into training
    tau_pos: 0.5                # Manhattan-distance residual threshold (DPOS_CLASSES vectors)
    tau_energy: 0.03             # |denergy| residual threshold; empirically, ordinary
    # body-model regression noise on denergy has ~median 0.014, ~p99 0.026 (measured
    # on configs/smoke.yaml at 40k ticks) — tau_energy must clear that noise floor or
    # the classifier collapses to always-WORLD. Re-measure if body_hidden/lr change.
    lr: 1.0e-3

mirror:                       # additive (stage-6a): self-state divergence monitor
  enabled: false               # gates responses only; divergence is ALWAYS
                               # logged under rssm (monitored, never minimized)
  threshold: 3.0               # cells; crossing triggers probe + MPC
  warmup_ticks: 20000          # responses disarmed until the pose head has a
                               # trained baseline (calibrate, then arm)
  mpc_ticks: 4
  mpc_horizon: 6
  mpc_candidates: 64

memory:                       # additive (stage-5a): episodic memory
  enabled: false               # requires agent.core: rssm (KL write gate)
  capacity: 2000
  latent_dim: 32
  write_rate_target: 0.005     # ~1 write / 200 ticks (controller-adjusted)
  gate_eta: 0.05
  retrieve_k: 4
  w_sim: 1.0
  w_spatial: 1.0
  spatial_sigma: 8.0
  importance_tau: 20000        # recency decay for importance-based pruning

continuity:                   # additive (stage-7d): DEPENDENT variable only
  window_ticks: 4096           # eval window for the composite
  weights:                     # component weights (z-scored across the pool)
    preference_persistence: 1.0
    revisit_efficiency: 1.0
    forecaster_nmse_trend: 1.0
    reliability_ece: 1.0
    adaptation_half_life: 1.0

checkpoints:
  interval: 50_000
  keep_last: 3

run:
  run_dir: runs
  log_every: 1000
  assert_improvement: false
  jsonl_log: true              # additive: per-tick JSONL event log (env 0 stream)
  viz_dump_every: 512          # additive: live-viewer state dump interval (ticks)

researcher:                    # additive (stage-8): post-hoc analysis layer only
  ranker: v2                   # agenda ranker: v1 heuristic | v2 EIG (ablation pair)
  visit_steps: 15              # imagined-rollout length for directed-visit EIG
  probe_n: 32                  # probe-batch size for capability EIG
  monitors:                    # stage-B sequential monitors
    capability_test: cusum_frozen_baseline  # mean_shift = onset-detector ablation
    cusum_k_drift: 0.5         # per-check allowance, in frozen-baseline sigma
    #                            (standard SPC: k = delta/2 tunes for ~1-sigma
    #                            shifts; noise below k never accumulates)
    cusum_h_threshold: 5.0     # decision threshold on S (standard SPC choice:
    #                            ~5 sigma of accumulated excess before alarm)

evaluation_ladder:             # stage-C4 (experiments/runner.py --ladder)
  tier0_eval_ticks: 2048       # short seeded smoke-A/B per config knob;
  #                              tier-1 uses each proposal's own eval_window_ticks

architect:                     # stage-D (python -m architect) — experimenter-side
  offline: true                # kill switch: true = no network, drafting is a no-op
  model_id: claude-sonnet-5    # LLM for drafting/critique (recorded in provenance)
  temperature: 0.2
  max_tokens: 4096
  max_source_files: 6          # source-context caps for the prompt
  max_source_lines: 200
